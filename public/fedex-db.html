<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>305 Workspace — FedEx Delivery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f6fa; --surface: #fff; --border: #e4e7ed;
      --text: #1a1d23; --muted: #6b7280;
      --accent: #7c3aed; --accent-lt: #ede9fe;
      --green: #16a34a; --green-lt: #dcfce7;
      --blue: #0891b2;  --blue-lt: #cffafe;
      --orange: #d97706; --orange-lt: #fef3c7;
      --red: #dc2626;   --red-lt: #fee2e2;
      --teal: #0f766e;  --teal-lt: #ccfbf1;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 60; }
    .nav-brand { font-size: 16px; font-weight: 700; display: none; }
    .nav-brand span { color: var(--accent); }
    .nav-links { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .nav-link { font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: 6px; text-decoration: none; color: var(--muted); transition: background .15s, color .15s; white-space: nowrap; }
    .nav-link:hover { background: var(--bg); color: var(--text); }
    .nav-link.active { background: var(--accent-lt); color: var(--accent); }
    .nav-hamburger { display: none; background: none; border: none; cursor: pointer; padding: 6px 8px; color: var(--muted); }

    .mode-bar { background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 10px 28px; font-size: 14px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; }
    .mode-bar a { color: rgba(255,255,255,.8); text-decoration: none; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .mode-bar a:hover { color: #fff; }

    .page-wrap { flex: 1; padding: 16px 24px 40px; width: 100%; }

    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .status-text { font-size: 12px; color: var(--muted); flex: 1; }
    .tb-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 8px 16px; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; color: var(--accent); white-space: nowrap; }
    .tb-btn:hover { background: var(--accent-lt); border-color: var(--accent); }
    .tb-btn:disabled { opacity: .55; cursor: not-allowed; }
    .tb-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .tb-btn.primary:hover { background: #6d28d9; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tb-btn.loading svg { animation: spin .8s linear infinite; }

    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; max-height: calc(100vh - 220px); overflow-y: auto; }
    table { border-collapse: collapse; font-size: 12px; }
    thead th { background: #1e1b4b; color: #fff; padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; white-space: nowrap; position: sticky; top: 0; z-index: 2; border-right: 1px solid rgba(255,255,255,.08); }
    thead th:last-child { border-right: none; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(even) { background: #faf9ff; }
    tbody tr:hover { background: #f3f0ff; }
    tbody td { padding: 9px 14px; vertical-align: middle; white-space: nowrap; border-right: 1px solid #f0eeff; }
    tbody td:last-child { border-right: none; }

    .td-bold { font-weight: 700; }
    .td-muted { color: var(--muted); font-size: 11px; }

    .trk-link { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 11px; display: inline-flex; align-items: center; gap: 3px; }
    .trk-link:hover { text-decoration: underline; }

    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; white-space: nowrap; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .badge-delivered { background: var(--green-lt);  color: #166534; }
    .badge-transit   { background: var(--blue-lt);   color: #155e75; }
    .badge-out       { background: var(--teal-lt);   color: #134e4a; }
    .badge-exception { background: var(--red-lt);    color: #991b1b; }
    .badge-pending   { background: #f3f4f6;           color: var(--muted); }

    .msg-box { padding: 60px 24px; text-align: center; color: var(--muted); font-size: 13px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }

    .toast { position: fixed; bottom: 24px; right: 24px; background: #1e1b4b; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 12px; font-weight: 600; opacity: 0; transform: translateY(10px); transition: all .3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) {
      nav { padding: 0 16px; height: auto; min-height: 52px; position: relative; }
      .nav-brand { display: block; }
      .nav-hamburger { display: flex; align-items: center; }
      .nav-links { display: none; position: absolute; top: 52px; left: 0; right: 0; background: var(--surface); border-bottom: 1px solid var(--border); flex-direction: column; padding: 6px 0 10px; gap: 0; z-index: 100; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
      .nav-links.open { display: flex; }
      .nav-link { padding: 11px 20px; border-radius: 0; font-size: 14px; }
      .mode-bar { padding: 10px 16px; font-size: 12px; }
      .page-wrap { padding: 12px 12px 40px; }
    }
  </style>
</head>
<body>
<nav>
  <div class="nav-brand">305 <span>Workspace</span></div>
  <button class="nav-hamburger" onclick="document.getElementById('nav-links').classList.toggle('open')" aria-label="Menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="nav-links" id="nav-links">
    <a class="nav-link" href="/">&#8592; Home</a>
    <a class="nav-link active" href="warehouse.html">Warehouse Now</a>
    <a class="nav-link" href="production.html">Production</a>
    <a class="nav-link" href="samples.html">Samples Tracking</a>
    <a class="nav-link" href="design.html">Design</a>
    <a class="nav-link" href="shipment.html">New Shipment</a>
    <a class="nav-link" href="map.html">Map Updates</a>
    <a class="nav-link" href="forecast.html">Forecast</a>
    <a class="nav-link" href="gantt.html">Gantt Chart</a>
    <a class="nav-link" href="tradestone.html">Tradestone Updates</a>
    <a class="nav-link" href="rlm.html">RLM Updates</a>
    <a class="nav-link" href="dhl.html">DHL Duties Cost</a>
  </div>
</nav>

<div class="mode-bar">
  <span>FedEx Delivery</span>
  <a href="warehouse.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>
</div>

<div class="page-wrap">
  <div class="toolbar">
    <span class="status-text" id="status-text">Loading…</span>
    <button class="tb-btn" id="reload-btn" onclick="loadSheet()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Refresh Sheet
    </button>
    <button class="tb-btn primary" id="fedex-btn" onclick="refreshStatuses()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Refresh Status
    </button>
  </div>

  <div class="table-card">
    <div class="table-scroll">
      <div id="table-area">
        <div class="msg-box"><div class="spinner"></div>Loading…</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/1y0iL7PJldbVQmPIAnJi9wvA2hvjB8_aK2bU2kxvUf5Q/gviz/tq?tqx=out:csv&gid=99866922';

let currentRows = [];

function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg, ms = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

function findCol(H, ...kws) {
  return H.findIndex(h => kws.some(k => h.trim().toLowerCase().includes(k.toLowerCase())));
}

function parseDate(s) { const d = new Date(s); return isNaN(d) ? null : d; }

function fmtDate(s) {
  const d = parseDate(s);
  return d ? d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'2-digit' }) : (s || '—');
}

function parseCSV(text) {
  const rows = []; let row = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') inQ = false;
      else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || (c === '\r' && text[i+1] === '\n')) {
        if (c === '\r') i++;
        row.push(field); field = '';
        if (row.some(f => f.trim())) rows.push(row);
        row = [];
      } else field += c;
    }
  }
  if (row.length) { row.push(field); if (row.some(f => f.trim())) rows.push(row); }
  return rows;
}

function classifyStatus(raw) {
  const v = (raw || '').toLowerCase();
  if (!v) return 'pending';
  if (v.includes('delivered') || v.includes('entregado'))         return 'delivered';
  if (v.includes('out for delivery') || v.includes('en camino'))  return 'out';
  if (v.includes('exception') || v.includes('excepci'))           return 'exception';
  if (v.includes('transit') || v.includes('tránsito') || v.includes('picked up') || v.includes('on the way')) return 'transit';
  return 'transit';
}

function statusBadge(raw) {
  if (!raw) return `<span class="badge badge-pending"><span class="dot"></span>Pending</span>`;
  const cls = classifyStatus(raw);
  const label = raw.split('·')[0].trim();
  return `<span class="badge badge-${cls}"><span class="dot"></span>${esc(label)}</span>`;
}

function renderTable(rows) {
  if (!rows.length) {
    document.getElementById('table-area').innerHTML = '<div class="msg-box">No SHIPPED shipments found in the last 30 days.</div>';
    document.getElementById('status-text').textContent = '0 shipments';
    return;
  }
  let html = `<table><thead><tr>
    <th>Style #</th><th>PO #</th><th>Ship Date</th><th>NDC</th><th>Tracking #</th><th>Delivery Status</th>
  </tr></thead><tbody>`;
  rows.forEach(r => {
    const fedexUrl = `https://www.fedex.com/fedextrack/?trknbr=${encodeURIComponent(r.tracking)}`;
    html += `<tr>
      <td class="td-bold">${esc(r.style || '—')}</td>
      <td class="td-muted">${esc(r.po || '—')}</td>
      <td>${esc(fmtDate(r.ship))}</td>
      <td>${esc(fmtDate(r.cancel))}</td>
      <td><a class="trk-link" href="${esc(fedexUrl)}" target="_blank" rel="noopener">${esc(r.tracking)}
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a></td>
      <td>${statusBadge(r.deliveryStatus || r.currentSts)}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('table-area').innerHTML = html;
  document.getElementById('status-text').textContent = `${rows.length} shipments`;
}

async function loadSheet() {
  document.getElementById('table-area').innerHTML = '<div class="msg-box"><div class="spinner"></div>Loading…</div>';
  document.getElementById('status-text').textContent = 'Loading…';
  document.getElementById('reload-btn').classList.add('loading');
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = parseCSV(await res.text());
    if (rows.length < 2) throw new Error('No data');

    const H = rows[0].map(h => h.trim().replace(/^﻿/, ''));
    const CI = {
      style:  0,
      po:     1,
      status: findCol(H, 'warehouse status', 'wh status', 'status'),
      ship:   findCol(H, 'ship date tradestone', 'ship date'),
      cancel: findCol(H, 'cancel date'),
      trk:    findCol(H, 'tracking number'),
      sts:    findCol(H, 'delivery status', 'fedex status'),
    };

    const get = (r, i) => i >= 0 ? (r[i] || '').trim() : '';
    const cutoff = new Date(Date.now() - 30 * 86400000);

    currentRows = [];
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      const trk    = get(r, CI.trk);
      const sd     = parseDate(get(r, CI.ship));
      const rowSts = get(r, CI.status).toLowerCase();
      if (!trk || !sd || sd < cutoff || !rowSts.includes('ship')) continue;
      currentRows.push({
        rowIndex: i,
        tracking: trk,
        style:  get(r, CI.style),
        po:     get(r, CI.po),
        status: get(r, CI.status),
        ship:   get(r, CI.ship),
        cancel: get(r, CI.cancel),
        currentSts: get(r, CI.sts),
      });
    }
    renderTable(currentRows);
  } catch (e) {
    document.getElementById('table-area').innerHTML =
      `<div class="msg-box">Could not load sheet.<br><small style="color:#9ca3af">${esc(e.message)}</small></div>`;
    document.getElementById('status-text').textContent = 'Error';
  }
  document.getElementById('reload-btn').classList.remove('loading');
}

async function refreshStatuses() {
  const btn = document.getElementById('fedex-btn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Fetching from FedEx…`;
  document.getElementById('status-text').textContent = 'Contacting FedEx API…';
  try {
    const r = await fetch('/api/fedex-status', { method: 'POST' });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Failed');
    if (d.rows && d.rows.length) {
      currentRows = d.rows;
      renderTable(currentRows);
      toast(`✓ Updated ${d.updated} status(es) — sheet saved`);
    } else {
      toast('No matching shipments found');
    }
  } catch (e) {
    document.getElementById('status-text').textContent = 'Error';
    toast('Error: ' + e.message, 5000);
  }
  btn.classList.remove('loading');
  btn.disabled = false;
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Refresh Status`;
}

loadSheet();
</script>
</body>
</html>
