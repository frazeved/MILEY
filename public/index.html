<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>305 Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f9fc;
      --surface: #ffffff;
      --border: #e4e7ed;
      --text: #1a1d23;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --accent: #2563eb;
      --accent-light: #eff6ff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP BRAND BAR ── */
    .brand-bar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand-logos {
      display: flex;
      align-items: center;
      gap: 40px;
    }

    .brand-logos img {
      height: 48px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .brand-divider {
      width: 1px;
      height: 32px;
      background: var(--border);
    }

    .logo-305 img { height: 52px; }
    .logo-farmrio img { height: 38px; }
    .logo-anthro img { height: 28px; }

    /* ── NAV ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-link {
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 6px;
      text-decoration: none;
      color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .nav-link:hover { background: var(--bg); color: var(--text); }
    .nav-link.active { background: var(--accent-light); color: var(--accent); }

    /* ── MAIN ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    /* ── WORKSPACE GRID ── */
    .workspace-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
    }

    .workspace-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 16px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--text);
      transition: box-shadow 0.18s, transform 0.18s, border-color 0.18s;
      cursor: pointer;
    }

    .workspace-card:hover {
      box-shadow: 0 8px 28px rgba(0,0,0,0.09);
      transform: translateY(-2px);
      border-color: #c7d7f9;
    }

    .workspace-card.soon {
      opacity: 0.55;
      cursor: default;
    }
    .workspace-card.soon:hover {
      box-shadow: none;
      transform: none;
      border-color: var(--border);
    }

    .card-icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
    }

    .card-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-align: center;
      margin-top: -8px;
    }

    .soon-badge {
      font-size: 10px;
      background: var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      padding: 2px 7px;
      font-weight: 500;
      margin-top: -6px;
    }

    /* ── ICON COLORS ── */
    .icon-blue   { background: #eff6ff; }
    .icon-green  { background: #f0fdf4; }
    .icon-amber  { background: #fffbeb; }
    .icon-purple { background: #faf5ff; }
    .icon-rose   { background: #fff1f2; }
    .icon-teal   { background: #f0fdfa; }
    .icon-indigo { background: #eef2ff; }
  </style>
</head>
<body>

<!-- BRAND BAR -->
<div class="brand-bar">
  <div class="brand-logos">
    <div class="logo-farmrio"><img src="FARM RIO LOGO.png" alt="Farm Rio" /></div>
    <div class="brand-divider"></div>
    <div class="logo-anthro"><img src="ANTHROPOLOGIE LOGO.png" alt="Anthropologie" /></div>
  </div>
  <div class="logo-305"><img src="305 LOGO.png" alt="305 Consulting & Production" /></div>
</div>

<!-- NAV -->
<nav>
  <a class="nav-link active" href="/">Home</a>
  <a class="nav-link" href="tradestone.html">Tradestone Updates</a>
  <a class="nav-link soon-nav" href="#" style="color:var(--text-muted);cursor:default;font-size:12px;padding:5px 12px;">Warehouse Now</a>
  <a class="nav-link soon-nav" href="#" style="color:var(--text-muted);cursor:default;font-size:12px;padding:5px 12px;">Production E-mails</a>
  <a class="nav-link soon-nav" href="#" style="color:var(--text-muted);cursor:default;font-size:12px;padding:5px 12px;">RLM Updates</a>
  <a class="nav-link soon-nav" href="#" style="color:var(--text-muted);cursor:default;font-size:12px;padding:5px 12px;">Map Updates</a>
  <a class="nav-link soon-nav" href="#" style="color:var(--text-muted);cursor:default;font-size:12px;padding:5px 12px;">Forecast</a>
  <a class="nav-link soon-nav" href="#" style="color:var(--text-muted);cursor:default;font-size:12px;padding:5px 12px;">Gantt Chart</a>
</nav>

<!-- MAIN -->
<main>
  <div class="section-label">Team Workspaces</div>

  <div class="workspace-grid">

    <!-- SAMANTHA — Tradestone Updates -->
    <a class="workspace-card" href="tradestone.html">
      <div class="card-icon icon-blue">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <div class="card-label">Tradestone</div>
      <div class="card-name">Samantha</div>
    </a>

    <!-- JHONNY — Warehouse Now -->
    <div class="workspace-card soon">
      <div class="card-icon icon-amber">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div class="card-label">Warehouse</div>
      <div class="card-name">Jhonny</div>
      <span class="soon-badge">soon</span>
    </div>

    <!-- SUSAN — Production E-mails -->
    <div class="workspace-card soon">
      <div class="card-icon icon-rose">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#e11d48" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <div class="card-label">Production</div>
      <div class="card-name">Susan</div>
      <span class="soon-badge">soon</span>
    </div>

    <!-- CAROLINE — RLM Updates -->
    <div class="workspace-card soon">
      <div class="card-icon icon-purple">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <div class="card-label">RLM Updates</div>
      <div class="card-name">Caroline</div>
      <span class="soon-badge">soon</span>
    </div>

    <!-- GABRIEL — Map Updates -->
    <div class="workspace-card soon">
      <div class="card-icon icon-teal">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
          <line x1="8" y1="2" x2="8" y2="18"/>
          <line x1="16" y1="6" x2="16" y2="22"/>
        </svg>
      </div>
      <div class="card-label">Map Updates</div>
      <div class="card-name">Gabriel</div>
      <span class="soon-badge">soon</span>
    </div>

    <!-- JIMMY — Forecast -->
    <div class="workspace-card soon">
      <div class="card-icon icon-green">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6"  y1="20" x2="6"  y2="14"/>
          <line x1="2"  y1="20" x2="22" y2="20"/>
        </svg>
      </div>
      <div class="card-label">Forecast</div>
      <div class="card-name">Jimmy</div>
      <span class="soon-badge">soon</span>
    </div>

    <!-- MILEY — Gantt Chart -->
    <div class="workspace-card soon">
      <div class="card-icon icon-indigo">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3"  y="4"  width="9" height="3" rx="1"/>
          <rect x="8"  y="9"  width="11" height="3" rx="1"/>
          <rect x="5"  y="14" width="7" height="3" rx="1"/>
          <rect x="10" y="19" width="8" height="3" rx="1" opacity="0.5"/>
          <line x1="3" y1="2" x2="3" y2="22" stroke-dasharray="2 2" opacity="0.3"/>
        </svg>
      </div>
      <div class="card-label">Gantt Chart</div>
      <div class="card-name">Miley</div>
      <span class="soon-badge">soon</span>
    </div>

  </div>
</main>

</body>
</html>
