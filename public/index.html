<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>305 Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f9fc;
      --surface: #ffffff;
      --border: #e4e7ed;
      --text: #1a1d23;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --accent: #2563eb;
      --accent-light: #eff6ff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP BRAND BAR ── */
    .brand-bar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand-logos {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    .brand-logos img {
      width: auto;
      object-fit: contain;
      display: block;
    }

    .brand-divider {
      width: 1px;
      height: 36px;
      background: var(--border);
    }

    .logo-305 {
      flex-shrink: 0;
      height: 100px;
      display: flex;
      align-items: center;
    }
    .logo-305 img {
      height: 100px;
      width: auto;
      object-fit: contain;
    }
    .logo-farmrio img { height: 44px; }
    .logo-anthro img  { height: 32px; }

    /* ── NAV ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-link {
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 6px;
      text-decoration: none;
      color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .nav-link:hover { background: var(--bg); color: var(--text); }
    .nav-link.active { background: var(--accent-light); color: var(--accent); }

    /* ── MAIN ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px 40px 80px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    /* ── WORKSPACE GRID ── */
    .workspace-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    @media (max-width: 900px) { .workspace-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .workspace-grid { grid-template-columns: 1fr; } }

    .workspace-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 20px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-decoration: none;
      color: var(--text);
      transition: box-shadow 0.18s, transform 0.18s, border-color 0.18s;
      cursor: pointer;
      min-height: 280px;
      justify-content: center;
    }

    .workspace-card:hover {
      box-shadow: 0 12px 36px rgba(0,0,0,0.1);
      transform: translateY(-3px);
      border-color: #c7d7f9;
    }

    .workspace-card.soon {
      opacity: 1;
      cursor: pointer;
    }

    .card-icon {
      width: 140px;
      height: 140px;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: #ffffff;
      border: 1.5px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .card-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .card-icon svg {
      width: 64px;
      height: 64px;
    }

    .card-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
    }

    .card-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-align: center;
      margin-top: -10px;
    }

    .soon-badge {
      font-size: 10px;
      background: var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      padding: 3px 8px;
      font-weight: 500;
      margin-top: -6px;
    }
  </style>
</head>
<body>

<!-- BRAND BAR -->
<div class="brand-bar">
  <div class="logo-305"><img src="305 LOGO.png" alt="305 Consulting & Production" /></div>
  <div class="brand-logos">
    <div class="logo-farmrio"><img src="FARM RIO LOGO.png" alt="Farm Rio" /></div>
    <div class="brand-divider"></div>
    <div class="logo-anthro"><img src="ANTHROPOLOGIE LOGO.png" alt="Anthropologie" /></div>
  </div>
  <div></div>
</div>

<!-- NAV -->
<nav>
  <a class="nav-link active" href="/">Home</a>
  <a class="nav-link" href="tradestone.html">Tradestone Updates</a>
  <a class="nav-link soon-nav" href="#" style="color:var(--text-muted);cursor:default;font-size:12px;padding:5px 12px;">Warehouse Now</a>
  <a class="nav-link soon-nav" href="#" style="color:var(--text-muted);cursor:default;font-size:12px;padding:5px 12px;">Production E-mails</a>
  <a class="nav-link soon-nav" href="#" style="color:var(--text-muted);cursor:default;font-size:12px;padding:5px 12px;">RLM Updates</a>
  <a class="nav-link soon-nav" href="#" style="color:var(--text-muted);cursor:default;font-size:12px;padding:5px 12px;">Map Updates</a>
  <a class="nav-link soon-nav" href="#" style="color:var(--text-muted);cursor:default;font-size:12px;padding:5px 12px;">Forecast</a>
  <a class="nav-link soon-nav" href="#" style="color:var(--text-muted);cursor:default;font-size:12px;padding:5px 12px;">Gantt Chart</a>
</nav>

<!-- MAIN -->
<main>
  <div class="section-label">Team Workspaces</div>

  <div class="workspace-grid">

    <!-- SAMANTHA — Tradestone Updates -->
    <a class="workspace-card" href="tradestone.html">
      <div class="card-icon">
        <img src="TRADESTONE LOGO.png" alt="Tradestone" />
      </div>
      <div class="card-label">Tradestone Updates</div>
      <div class="card-name">Samantha</div>
    </a>

    <!-- JHONNY — Warehouse Now -->
    <a class="workspace-card soon" href="warehouse.html">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div class="card-label">Warehouse Now</div>
      <div class="card-name">Jhonny</div>
    </a>

    <!-- SUSAN — Production E-mails -->
    <a class="workspace-card" href="production.html">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#e11d48" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <div class="card-label">Production E-mails</div>
      <div class="card-name">Susan</div>
    </a>

    <!-- CAROLINE — RLM Updates -->
    <a class="workspace-card" href="rlm.html">
      <div class="card-icon">
        <img src="RLM LOGO.png" alt="RLM" />
      </div>
      <div class="card-label">RLM Updates</div>
      <div class="card-name">Caroline</div>
    </a>

    <!-- GABRIEL — Map Updates -->
    <a class="workspace-card" href="map.html">
      <div class="card-icon">
        <img src="MAP UPDATED LOGO.png" alt="Map Updates" />
      </div>
      <div class="card-label">Map Updates</div>
      <div class="card-name">Gabriel</div>
    </a>

    <!-- JIMMY — Forecast -->
    <a class="workspace-card" href="forecast.html">
      <div class="card-icon">
        <img src="FORECAST.png" alt="Forecast" />
      </div>
      <div class="card-label">Forecast</div>
      <div class="card-name">Jimmy</div>
    </a>

    <!-- MILEY — Gantt Chart -->
    <a class="workspace-card" href="gantt.html">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3"  y="4"  width="9" height="3" rx="1"/>
          <rect x="8"  y="9"  width="11" height="3" rx="1"/>
          <rect x="5"  y="14" width="7" height="3" rx="1"/>
          <rect x="10" y="19" width="8" height="3" rx="1"/>
        </svg>
      </div>
      <div class="card-label">Gantt Chart</div>
      <div class="card-name">Miley</div>
    </a>

  </div>
</main>

</body>
</html>
