<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>305 Workspace &mdash; Change Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f6fa; --surface: #fff; --border: #e4e7ed;
      --text: #1a1d23; --muted: #6b7280;
      --accent: #0891b2; --accent-hover: #0e7490;
      --red: #dc2626; --red-lt: #fee2e2;
      --green: #16a34a; --green-lt: #dcfce7;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 28px;
      transition: color 0.15s;
    }
    .back:hover { color: var(--accent); }
    .title { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
    .user-badge {
      display: inline-block;
      background: #ecfeff; color: var(--accent);
      font-size: 12px; font-weight: 700;
      padding: 4px 10px; border-radius: 99px;
      margin-bottom: 24px; letter-spacing: 0.3px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    input {
      font-family: inherit; font-size: 15px; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      outline: none; color: var(--text); background: var(--surface);
      transition: border-color 0.15s; width: 100%;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%; padding: 13px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-family: inherit;
      font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: background 0.15s;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { display: none; font-size: 13px; font-weight: 500; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; text-align: center; }
    .msg.error   { display: block; background: var(--red-lt);   color: var(--red);   }
    .msg.success { display: block; background: var(--green-lt); color: var(--green); }
    @media (max-width: 480px) {
      .card { padding: 28px 20px; border-radius: 16px; }
      input { font-size: 16px; padding: 13px 14px; }
      .btn  { font-size: 16px; padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <a class="back" href="/">&larr; Back to Workspace</a>

    <div class="title">Change Password</div>
    <div class="subtitle">Enter your current password and choose a new one.</div>
    <div class="user-badge" id="user-badge">Loading&hellip;</div>

    <div class="msg" id="msg"></div>

    <div class="form-group">
      <label for="current-pass">Current Password</label>
      <input id="current-pass" type="password" placeholder="Your current password" autocomplete="current-password" />
    </div>
    <div class="form-group">
      <label for="new-pass">New Password</label>
      <input id="new-pass" type="password" placeholder="At least 6 characters" autocomplete="new-password" />
    </div>
    <div class="form-group">
      <label for="confirm-pass">Confirm New Password</label>
      <input id="confirm-pass" type="password" placeholder="Repeat new password" autocomplete="new-password" />
    </div>

    <button class="btn" id="save-btn" onclick="save()">Update Password</button>
  </div>

  <script>
    (async () => {
      try {
        const r = await fetch('/api/me');
        if (!r.ok) { window.location.href = '/login'; return; }
        const u = await r.json();
        document.getElementById('user-badge').textContent = u.name + ' · ' + u.email;
      } catch (_) { window.location.href = '/login'; }
    })();

    async function save() {
      const btn     = document.getElementById('save-btn');
      const msg     = document.getElementById('msg');
      const current = document.getElementById('current-pass').value;
      const newPass = document.getElementById('new-pass').value;
      const confirm = document.getElementById('confirm-pass').value;

      msg.className = 'msg';

      if (!current) { showErr('Enter your current password.'); return; }
      if (newPass.length < 6) { showErr('New password must be at least 6 characters.'); return; }
      if (newPass !== confirm) { showErr('New passwords do not match.'); return; }

      btn.disabled = true;
      btn.textContent = 'Saving…';

      try {
        const res  = await fetch('/api/change-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ currentPassword: current, newPassword: newPass }),
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Failed to update password');

        msg.textContent = 'Password updated successfully!';
        msg.className = 'msg success';
        document.getElementById('current-pass').value = '';
        document.getElementById('new-pass').value     = '';
        document.getElementById('confirm-pass').value = '';
      } catch (err) {
        showErr(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    }

    function showErr(text) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.className = 'msg error';
    }
  </script>
  <script src="/auth.js"></script>
</body>
</html>
