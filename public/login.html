<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>305 Workspace — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f6fa; --surface: #fff; --border: #e4e7ed;
      --text: #1a1d23; --muted: #6b7280;
      --accent: #0891b2; --accent-hover: #0e7490; --accent-light: #ecfeff;
      --red: #dc2626; --red-lt: #fee2e2; --green: #16a34a; --green-lt: #dcfce7;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-name {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .brand-name span { color: var(--accent); }
    .brand-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      font-family: inherit;
      font-size: 15px;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      outline: none;
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.15s;
      width: 100%;
    }
    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
      letter-spacing: 0.2px;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg {
      display: none;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      text-align: center;
    }
    .msg.error  { display: block; background: var(--red-lt);   color: var(--red);   }
    .msg.success{ display: block; background: var(--green-lt); color: var(--green); }

    /* ── Change-password overlay ── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .overlay.show { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }
    .modal-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .modal-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .modal-cancel {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      font-family: inherit;
      width: 100%;
    }
    .modal-cancel:hover { color: var(--text); }

    @media (max-width: 480px) {
      .card  { padding: 32px 24px; border-radius: 16px; }
      .modal { padding: 28px 20px; }
      input  { font-size: 16px; padding: 13px 14px; }
      .btn   { font-size: 16px; padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-name">305 <span>Workspace</span></div>
      <div class="brand-sub">Sign in to continue</div>
    </div>

    <div class="msg" id="login-msg"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@company.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••••" autocomplete="current-password" required />
      </div>
      <button class="btn" id="submit-btn" type="submit">Sign In</button>
    </form>
  </div>

  <!-- Force change-password overlay -->
  <div class="overlay" id="change-overlay">
    <div class="modal">
      <div class="modal-title">Create your password</div>
      <div class="modal-sub">Your account is using a temporary password. Please set a new one before continuing.</div>

      <div class="msg" id="cp-msg"></div>

      <div class="form-group">
        <label for="new-pass">New Password</label>
        <input id="new-pass" type="password" placeholder="At least 6 characters" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label for="confirm-pass">Confirm Password</label>
        <input id="confirm-pass" type="password" placeholder="Repeat new password" autocomplete="new-password" />
      </div>
      <button class="btn" id="cp-btn" onclick="handleChangePassword()">Save &amp; Continue</button>
      <button class="modal-cancel" onclick="cancelChangePassword()">Cancel — go back to sign in</button>
    </div>
  </div>

  <script>
    let _loginPassword = '';

    function cancelChangePassword() {
      document.getElementById('change-overlay').classList.remove('show');
      document.getElementById('cp-msg').className = 'msg';
      document.getElementById('new-pass').value = '';
      document.getElementById('confirm-pass').value = '';
      _loginPassword = '';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn   = document.getElementById('submit-btn');
      const msg   = document.getElementById('login-msg');
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      msg.className = 'msg';

      try {
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass }),
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Login failed');

        if (json.mustChangePassword) {
          _loginPassword = pass;
          document.getElementById('change-overlay').classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Sign In';
        } else {
          window.location.href = '/';
        }
      } catch (err) {
        msg.textContent = err.message;
        msg.className = 'msg error';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    async function handleChangePassword() {
      const btn     = document.getElementById('cp-btn');
      const msg     = document.getElementById('cp-msg');
      const newPass = document.getElementById('new-pass').value;
      const confirm = document.getElementById('confirm-pass').value;

      msg.className = 'msg';

      if (!newPass || newPass.length < 6) {
        msg.textContent = 'Password must be at least 6 characters.';
        msg.className = 'msg error';
        return;
      }
      if (newPass !== confirm) {
        msg.textContent = 'Passwords do not match.';
        msg.className = 'msg error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Saving…';

      try {
        const res  = await fetch('/api/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ currentPassword: _loginPassword, newPassword: newPass }),
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Failed to save password');
        window.location.href = '/';
      } catch (err) {
        msg.textContent = err.message;
        msg.className = 'msg error';
        btn.disabled = false;
        btn.textContent = 'Save & Continue';
      }
    }
  </script>
</body>
</html>
