<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>305 Workspace — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f6fa; --surface: #fff; --border: #e4e7ed;
      --text: #1a1d23; --muted: #6b7280;
      --accent: #0891b2; --accent-hover: #0e7490; --accent-light: #ecfeff;
      --red: #dc2626; --red-lt: #fee2e2;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-name {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .brand-name span { color: var(--accent); }
    .brand-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      font-family: inherit;
      font-size: 15px;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      outline: none;
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.15s;
      width: 100%;
    }
    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
      letter-spacing: 0.2px;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      display: none;
      background: var(--red-lt);
      color: var(--red);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      text-align: center;
    }
    .error-msg.show { display: block; }

    @media (max-width: 480px) {
      .card { padding: 32px 24px; border-radius: 16px; }
      input { font-size: 16px; padding: 13px 14px; }
      .btn { font-size: 16px; padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-name">305 <span>Workspace</span></div>
      <div class="brand-sub">Sign in to continue</div>
    </div>

    <div class="error-msg" id="error-msg">Invalid email or password.</div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@company.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••••" autocomplete="current-password" required />
      </div>
      <button class="btn" id="submit-btn" type="submit">Sign In</button>
    </form>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn   = document.getElementById('submit-btn');
      const err   = document.getElementById('error-msg');
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.classList.remove('show');

      try {
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass }),
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Login failed');
        window.location.href = '/';
      } catch (e) {
        err.textContent = e.message;
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
